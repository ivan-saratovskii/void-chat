<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOID CHAT</title>
<script src="/socket.io/socket.io.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap');

  :root {
    --bg: #080808;
    --surface: #0f0f0f;
    --border: #1e1e1e;
    --border-glow: #2a2a2a;
    --text: #d0d0d0;
    --text-dim: #484848;
    --text-muted: #2e2e2e;
    --accent: #e8e8e8;
    --accent2: #888;
    --me: #c8f0c8;
    --them: #c8d8f0;
    --system: #404040;
    --red: #f06060;
    --green: #60c060;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* ── ENTER SCREEN ── */
  #enter {
    width: 100%;
    max-width: 420px;
    padding: 24px;
    animation: fadeUp 0.4s ease;
  }

  .logo {
    font-size: 11px;
    letter-spacing: 0.4em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 40px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo::before {
    content: '';
    display: block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s infinite;
  }

  .field-label {
    font-size: 9px;
    letter-spacing: 0.3em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .field {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border-glow);
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    padding: 10px 0;
    outline: none;
    margin-bottom: 28px;
    transition: border-color 0.2s;
  }
  .field:focus { border-color: var(--accent2); }
  .field::placeholder { color: var(--text-muted); }

  .btn {
    width: 100%;
    background: transparent;
    border: 1px solid var(--border-glow);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn:hover { border-color: var(--accent2); color: var(--accent); }
  .btn:active { background: var(--border); }

  .hint {
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    margin-top: 20px;
    line-height: 1.8;
  }

  /* ── CHAT SCREEN ── */
  #chat {
    display: none;
    width: 100%;
    max-width: 680px;
    height: 100dvh;
    flex-direction: column;
  }

  .chat-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .room-name {
    font-size: 10px;
    letter-spacing: 0.35em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .status-area {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .online-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }

  .online-count {
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 0.2em;
  }

  .leave-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    cursor: pointer;
    padding: 4px 8px;
    transition: color 0.2s;
  }
  .leave-btn:hover { color: var(--red); }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .msg-row {
    display: flex;
    gap: 10px;
    animation: fadeUp 0.15s ease;
  }
  .msg-row.me { flex-direction: row-reverse; }

  .msg-nick {
    font-size: 8px;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    padding-top: 3px;
    flex-shrink: 0;
    min-width: 60px;
  }
  .msg-row.me .msg-nick { text-align: right; }

  .msg-bubble {
    font-size: 13px;
    line-height: 1.55;
    padding: 8px 12px;
    max-width: 75%;
    word-break: break-word;
    white-space: pre-wrap;
  }
  .msg-row.me .msg-bubble { color: var(--me); }
  .msg-row.them .msg-bubble { color: var(--them); }

  .msg-system {
    font-size: 9px;
    color: var(--system);
    letter-spacing: 0.2em;
    text-align: center;
    padding: 6px 0;
    animation: fadeUp 0.15s ease;
  }

  .chat-input-area {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    display: flex;
    gap: 12px;
    align-items: flex-end;
  }

  .chat-textarea {
    flex: 1;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border-glow);
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    padding: 8px 0;
    outline: none;
    resize: none;
    min-height: 36px;
    max-height: 120px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }
  .chat-textarea:focus { border-color: var(--accent2); }
  .chat-textarea::placeholder { color: var(--text-muted); }

  .send-btn {
    background: none;
    border: 1px solid var(--border-glow);
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    padding: 8px 14px;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
    align-self: flex-end;
    margin-bottom: 2px;
  }
  .send-btn:hover { border-color: var(--accent2); color: var(--accent); }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>

<!-- ENTER SCREEN -->
<div id="enter">
  <div class="logo">void chat</div>

  <div class="field-label">Nickname</div>
  <input class="field" id="nickInput" placeholder="anonymous" maxlength="20" autocomplete="off">

  <div class="field-label">Room password</div>
  <input class="field" id="passInput" placeholder="shared secret" type="password" autocomplete="off">

  <button class="btn" onclick="joinRoom()">Enter room</button>

  <div class="hint">
    · messages are end-to-end encrypted<br>
    · nothing is stored on the server<br>
    · same password = same room
  </div>
</div>

<!-- CHAT SCREEN -->
<div id="chat">
  <div class="chat-header">
    <div class="room-name" id="roomLabel">—</div>
    <div class="status-area">
      <div class="online-dot"></div>
      <div class="online-count"><span id="onlineCount">1</span> online</div>
      <button class="leave-btn" onclick="leaveRoom()">leave</button>
    </div>
  </div>
  <div class="messages" id="msgBox"></div>
  <div class="chat-input-area">
    <textarea class="chat-textarea" id="msgInput" placeholder="message..." rows="1"></textarea>
    <button class="send-btn" onclick="sendMsg()">send</button>
  </div>
</div>

<script>
  const socket = io();

  let myNick = '';
  let chainKey = '';
  let chainSalt = '';
  let roomId = '';

  // ── CRYPTO ──────────────────────────────────────────────

  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  async function deriveRoomId(password) {
    // Комната = первые 8 символов хеша пароля — сервер не знает пароль
    const h = await sha256('room::' + password);
    return h.substring(0, 8);
  }

  async function generateNoise(key, salt, len = 4096) {
    const enc = new TextEncoder();
    let noise = new Uint8Array(0), ctr = 0;
    while (noise.length < len) {
      const h = await crypto.subtle.digest('SHA-256', enc.encode(key + salt + ctr));
      const tmp = new Uint8Array(noise.length + 32);
      tmp.set(noise); tmp.set(new Uint8Array(h), noise.length);
      noise = tmp; ctr++;
    }
    return noise.slice(0, len);
  }

  async function encrypt(text, key, salt) {
    const noise = await generateNoise(key, salt, 4096);
    const data = new TextEncoder().encode(text);
    const res = new Uint8Array(data.length);
    for (let i = 0; i < data.length; i++) res[i] = data[i] ^ noise[i % 4096];
    return btoa(String.fromCharCode(...res));
  }

  async function decrypt(b64, key, salt) {
    try {
      const noise = await generateNoise(key, salt, 4096);
      const raw = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
      const dec = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) dec[i] = raw[i] ^ noise[i % 4096];
      return new TextDecoder().decode(dec);
    } catch { return '[decrypt error]'; }
  }

  async function advanceChain(key, salt, text) {
    const seed = await sha256(key + salt + text);
    return { key: seed.substring(0, 12).toUpperCase(), salt: seed.substring(12, 18) };
  }

  // ── JOIN / LEAVE ─────────────────────────────────────────

  async function joinRoom() {
    const nick = document.getElementById('nickInput').value.trim() || 'anon';
    const pass = document.getElementById('passInput').value.trim();
    if (!pass) { document.getElementById('passInput').focus(); return; }

    myNick = nick;
    const h = await sha256('init::' + pass);
    chainKey  = h.substring(0, 12).toUpperCase();
    chainSalt = h.substring(12, 18);
    roomId = await deriveRoomId(pass);

    document.getElementById('roomLabel').textContent = '#' + roomId;
    document.getElementById('enter').style.display = 'none';
    document.getElementById('chat').style.display = 'flex';

    socket.emit('join', roomId);
    document.getElementById('msgInput').focus();
  }

  function leaveRoom() {
    location.reload();
  }

  // ── SEND ─────────────────────────────────────────────────

  async function sendMsg() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text) return;

    const enc = await encrypt(text, chainKey, chainSalt);
    socket.emit('msg', { d: enc, k: chainKey, s: chainSalt, n: myNick });

    addMessage(myNick, text, 'me');
    input.value = '';
    input.style.height = 'auto';

    const next = await advanceChain(chainKey, chainSalt, text);
    chainKey = next.key;
    chainSalt = next.salt;
  }

  // ── RECEIVE ──────────────────────────────────────────────

  socket.on('msg', async (payload) => {
    const text = await decrypt(payload.d, payload.k, payload.s);
    addMessage(payload.n || 'anon', text, 'them');
  });

  socket.on('room_info', ({ online }) => {
    document.getElementById('onlineCount').textContent = online;
  });

  // ── UI HELPERS ───────────────────────────────────────────

  function addMessage(nick, text, side) {
    const box = document.getElementById('msgBox');
    const row = document.createElement('div');
    row.className = 'msg-row ' + side;
    row.innerHTML = `
      <div class="msg-nick">${esc(nick)}</div>
      <div class="msg-bubble">${esc(text)}</div>
    `;
    box.appendChild(row);
    box.scrollTop = box.scrollHeight;
  }

  function addSystem(text) {
    const box = document.getElementById('msgBox');
    const el = document.createElement('div');
    el.className = 'msg-system';
    el.textContent = text;
    box.appendChild(el);
    box.scrollTop = box.scrollHeight;
  }

  function esc(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Enter to send, Shift+Enter for newline
  document.getElementById('msgInput')?.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMsg();
    }
  });

  // Auto-resize textarea
  document.getElementById('msgInput')?.addEventListener('input', function () {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });

  // Enter to join on password field
  document.getElementById('passInput')?.addEventListener('keydown', e => {
    if (e.key === 'Enter') joinRoom();
  });
</script>
</body>
</html>
